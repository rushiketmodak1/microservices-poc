_format_version: "3.0"

services:

  - name: user-service
    url: http://host.docker.internal:3001

    routes:
      - name: user-route
        paths:
          - /users
        strip_path: false

  - name: product-service
    url: http://host.docker.internal:3002

    routes:
      - name: product-route
        paths:
          - /products
        strip_path: false

  - name: order-service
    url: http://host.docker.internal:3003

    routes:
      - name: order-route
        paths:
          - /orders
        strip_path: false

  - name: payment-service
    url: http://host.docker.internal:3004

    routes:
      - name: payment-route
        paths:
          - /payments
        strip_path: false
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
      exposed_headers:
        - Content-Length
      credentials: false
      max_age: 3600